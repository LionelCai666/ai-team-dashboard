<!-- 甘特图Tab内容 开始 -->
<style>
.gantt-container {
    width: 100%;
    min-height: 550px;
    background: #fff;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
    margin-bottom: 20px;
}
.gantt-title-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
}
.gantt-title {
    font-size: 20px;
    font-weight: 600;
    color: #1d2129;
    display: flex;
    align-items: center;
    gap: 12px;
}
.avatar-group {
    display: flex;
    align-items: center;
    gap: 8px;
}
.avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
}
.avatar-tiezhu {
    background: #ff7d00;
}
.avatar-thomas {
    background: #1677ff;
}
.gantt-main {
    display: flex;
    gap: 20px;
}
.gantt-left {
    width: 75%;
}
.gantt-right {
    width: 25%;
    background: #f7f8fa;
    border-radius: 8px;
    padding: 16px;
}
.switch-title {
    font-size: 16px;
    font-weight: 600;
    color: #1d2129;
    margin-bottom: 16px;
}
.project-item {
    padding: 12px;
    background: #fff;
    border-radius: 6px;
    margin-bottom: 12px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.3s;
}
.project-item.active {
    border-color: #1677ff;
    background: #e8f3ff;
}
.project-item:hover {
    border-color: #1677ff33;
}
.project-name {
    font-size: 14px;
    font-weight: 500;
    color: #1d2129;
    margin-bottom: 4px;
}
.project-status {
    font-size: 12px;
    color: #4e5969;
}
.gantt-tip {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #e5e6eb;
}
.gantt-tip-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #4e5969;
}
.gantt-tip-dot {
    width: 12px;
    height: 12px;
    border-radius: 2px;
}
.dot-completed { background: #00b42a; }
.dot-progress { background: #1677ff; }
.dot-pending { background: #86909c; }
#gantt {
    width: 100%;
    overflow-x: auto;
}
/* 响应式适配 */
@media (max-width: 768px) {
    .gantt-container {
        padding: 12px;
        min-height: 450px;
    }
    .gantt-title {
        font-size: 16px;
    }
    .gantt-main {
        flex-direction: column;
    }
    .gantt-left, .gantt-right {
        width: 100%;
    }
}
</style>

<div class="gantt-container">
    <div class="gantt-title-wrap">
        <div class="gantt-title">
            项目进度甘特图
            <div class="avatar-group">
                <div class="avatar avatar-tiezhu" title="总管：铁柱">铁</div>
                <div class="avatar avatar-thomas" title="项目管理专家：托马斯">托</div>
            </div>

    </div>
    <div class="gantt-main">
        <div class="gantt-left">
            <div class="gantt-tip">

                    <span class="gantt-tip-dot dot-completed"></span>已完成
                </div>
                <div class="gantt-tip-item">

                </div>
                <div class="gantt-tip-item">
                    <span class="gantt-tip-dot dot-pending"></span>待办
                </div>

            <div id="gantt"></div>

        <div class="gantt-right">
            <div class="switch-title">托马斯负责项目</div>

                <div class="project-item active" data-project="base">
                    <div class="project-name">基础看板建设项目</div>

                </div>
                <div class="project-item" data-project="lingnan">
                    <div class="project-name">岭南新型应用教育研究院启动项目</div>

                </div>

        </div>
    </div>
</div>

<!-- 引入甘特图依赖，无需本地部署 -->
<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>
<script>
// 项目任务配置
const projectTasks = {
    // 基础看板建设项目
    base: [
        {
            id: 'Task 1',
            name: '基础看板HTML开发',
            start: '2026-03-01',
            end: '2026-03-03',
            progress: 100,
            custom_class: 'gantt-completed'
        },
        {
            id: 'Task 2',
            name: '外网穿透访问配置',
            start: '2026-03-02',
            end: '2026-03-04',
            progress: 100,
            custom_class: 'gantt-completed'
        },
        {
            id: 'Task 3',
            name: '飞书全量消息同步配置',
            start: '2026-03-03',
            end: '2026-03-07',
            progress: 100,
            custom_class: 'gantt-completed'
        },
        {
            id: 'Task 4',
            name: '看板真实数据同步',
            start: '2026-03-06',
            end: '2026-03-10',
            progress: 60,
            custom_class: 'gantt-progress'
        },
        {
            id: 'Task 5',
            name: '固定公网访问地址配置',
            start: '2026-03-11',
            end: '2026-03-12',
            progress: 0,
            custom_class: 'gantt-pending'
        },
        {
            id: 'Task 6',
            name: '服务开机自启动配置',
            start: '2026-03-12',
            end: '2026-03-13',
            progress: 0,
            custom_class: 'gantt-pending'
        }
    ],
    // 岭南新型应用教育研究院启动项目
    lingnan: [
        {
            id: 'LN-Task1',
            name: '项目立项与章程制定',
            start: '2026-03-10',
            end: '2026-03-12',
            progress: 0,
            custom_class: 'gantt-pending'
        },
        {
            id: 'LN-Task2',
            name: '干系人访谈与需求收集',
            start: '2026-03-13',
            end: '2026-03-17',
            progress: 0,
            custom_class: 'gantt-pending'
        },
        {
            id: 'LN-Task3',
            name: '项目范围与里程碑确认',
            start: '2026-03-16',
            end: '2026-03-18',
            progress: 0,
            custom_class: 'gantt-pending'
        },
        {
            id: 'LN-Task4',
            name: 'WBS任务拆解与资源分配',
            start: '2026-03-18',
            end: '2026-03-21',
            progress: 0,
            custom_class: 'gantt-pending'
        },
        {
            id: 'LN-Task5',
            name: '项目启动会召开',
            start: '2026-03-22',
            end: '2026-03-22',
            progress: 0,
            custom_class: 'gantt-pending'
        },
        {
            id: 'LN-Task6',
            name: '第一阶段执行准备',
            start: '2026-03-23',
            end: '2026-03-25',
            progress: 0,
            custom_class: 'gantt-pending'
        }
    ]
};

// 甘特图初始化配置
const ganttOptions = {
    on_click: task => {
        console.log(task);
        // 可扩展点击弹窗查看项目详情
    },
    on_date_change: (task, start, end) => {
        console.log('任务时间更新', task, start, end);
        // 可扩展拖拽更新时间逻辑
    },
    on_progress_change: (task, progress) => {
        console.log('进度更新', task, progress);
        // 可扩展拖拽更新进度逻辑
    },
    view_mode: 'Day', // 默认按天展示，可选 Week/Month
    language: 'zh',
    // 适配样式
    bar_height: 28,
    padding: 18,
    date_format: 'YYYY-MM-DD',
    custom_popup_html: task => {
        const status = task.progress === 100 ? '已完成' : task.progress > 0 ? '进行中' : '待办';
        return `
            <div class="px-3 py-2" style="min-width: 180px;">
                <h6 class="text-sm font-semibold mb-1">${task.name}</h6>
                <p class="text-xs text-gray-600 mb-1">时间：${task.start} ~ ${task.end}</p>
                <p class="text-xs text-gray-600 mb-1">进度：${task.progress}%</p>
                <p class="text-xs font-medium" style="color: ${task.progress === 100 ? '#00b42a' : task.progress > 0 ? '#1677ff' : '#86909c'}">状态：${status}</p>
            </div>
        `;
    }
};

// 初始化甘特图
let gantt = new Gantt('#gantt', projectTasks.base, ganttOptions);

// 项目切换逻辑
document.querySelectorAll('.project-item').forEach(item => {
    item.addEventListener('click', () => {
        // 移除所有激活状态
        document.querySelectorAll('.project-item').forEach(i => i.classList.remove('active'));
        // 添加当前激活状态
        item.classList.add('active');
        // 获取项目ID
        const projectId = item.dataset.project;
        // 重新渲染甘特图
        gantt = new Gantt('#gantt', projectTasks[projectId], ganttOptions);
    });
});

// 响应式适配窗口大小变化
window.addEventListener('resize', () => {
    gantt.resize();
});
</script>
